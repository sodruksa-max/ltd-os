name: Weekly System Audit

on:
  schedule:
    - cron: '0 3 * * 0'   # Sunday 10:00 AM Thailand (3:00 AM UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq --quiet

      - name: Run weekly audit
        run: python scripts/weekly-audit.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit audit report
        run: |
          git config user.name "audit-bot"
          git config user.email "audit-bot@users.noreply.github.com"
          git add vault/90_archive/weekly-audits/
          git diff --staged --quiet || git commit -m "chore(audit): weekly system audit $(date +%Y-W%V)"
          git pull --rebase origin main
          git push

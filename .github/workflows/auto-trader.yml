name: Auto Trader

on:
  schedule:
    - cron: '45 13 * * 1-5'   # 9:45 AM EDT Mon-Fri (13:45 UTC)
  workflow_dispatch:            # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install alpaca-py yfinance pandas requests --quiet

      - name: Run auto-trader
        run: python scripts/auto-trader.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

      - name: Commit trade log
        run: |
          git config user.name "auto-trader-bot"
          git config user.email "auto-trader-bot@users.noreply.github.com"
          git add scripts/trade-log.json
          git diff --staged --quiet || git commit -m "chore(auto-trader): trade log $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push

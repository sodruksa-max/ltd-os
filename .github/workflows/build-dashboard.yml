name: Build Dashboard

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 22 * * 5'  # Friday 10PM Thailand (3PM UTC) — after nick-weekly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install alpaca-py yfinance pandas --quiet

      - name: Build dashboard HTML
        run: python scripts/build_dashboard.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

      - name: Commit dashboard
        run: |
          git config user.name "nick-bot"
          git config user.email "nick-bot@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore(dashboard): rebuild $(date +%Y-%m-%d)"
          git push

name: IPO Radar (Weekly)

on:
  schedule:
    - cron: '0 12 * * 1'  # Monday 12:00 UTC = 8:00 AM EDT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests --quiet

      - name: Run IPO scanner
        run: python scripts/ipo-scanner.py

      - name: Commit radar to inbox
        run: |
          git config user.name "ipo-scanner-bot"
          git config user.email "ipo-bot@users.noreply.github.com"
          git add vault/00_inbox/ipo-radar-*.md
          git diff --staged --quiet || git commit -m "chore(ipo): weekly radar $(date +%Y-%m-%d)"
          git push

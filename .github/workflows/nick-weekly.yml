name: Nick Weekly (Auto)

on:
  schedule:
    - cron: '30 21 * * 5'  # Friday 9:30 PM Thailand (2:30 PM UTC = after US market close)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install alpaca-py yfinance anthropic --quiet

      - name: Generate Nick weekly rec
        run: python code/python/nick_trader/nick_weekly_auto.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit weekly rec
        run: |
          git config user.name "nick-bot"
          git config user.email "nick-bot@users.noreply.github.com"
          git add vault/20_investment/nick/weekly/
          git diff --staged --quiet || git commit -m "chore(nick): auto weekly rec $(date +%Y-%m-%d)"
          git push

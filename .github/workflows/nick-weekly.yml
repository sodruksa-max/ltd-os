name: Nick Weekly (Auto)

on:
  schedule:
    - cron: '30 2 * * 6'   # Saturday 9:30 AM Thailand (2:30 AM UTC, after US Friday close)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install alpaca-py yfinance groq --quiet

      - name: Generate Nick market signals (tier labels, no prices)
        run: python scripts/nick-signal.py

      - name: Generate Nick weekly rec
        run: python code/python/nick_trader/nick_weekly_auto.py
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit weekly rec + NAV snapshot + signals
        run: |
          git config user.name "nick-bot"
          git config user.email "nick-bot@users.noreply.github.com"
          git add vault/20_investment/nick/weekly/ vault/20_investment/nick/performance/nav_log.md vault/Knowledge/nick-soul.md vault/Knowledge/nick-signals.md
          git diff --staged --quiet || git commit -m "chore(nick): auto weekly rec $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
